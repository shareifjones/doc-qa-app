<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document Q&A</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
            color: #333;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 40px;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 32px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }

        input[type="file"],
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            background-color: #2563eb;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover {
            background-color: #1d4ed8;
        }
        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #2563eb;
        }
    </style>
</head>
<body>
    <h1>Document Q&A</h1>
    <p class="subtitle"> Upload a document and ask any question about it.</p>

    <div class="card">
        <form action="/ask" method="POST" enctype="multipart/form-data">
            <label>Upload a document:</label>
            <input type="file" name="document">

            <label>Your question:</label><br>
            <input type="text" name="question" placeholder="e.g. What is the refund policy?">

            <button type="submit">Ask</button>
        </form>
    </div>
    

    {% if answer %}
    <div class="card">
        <h2>Answer: </h2>
        <!-- The | safe tells Jinja2 to render it as HTML instead of plain text. -->
        <p>{{ answer | safe }}</p>
    </div>
    {% endif %}

</body>
</html>
